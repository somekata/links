<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollama Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique&family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f1e8;
    --bg2: #fdfaf3;
    --surface: #ede8da;
    --border: #d4c9b0;
    --border-light: #e8e0cc;
    --text: #2c2417;
    --text-sub: #7a6e5f;
    --accent: #5c7a5c;
    --accent-light: #8aab8a;
    --accent-bg: #edf2ed;
    --user-bg: #e8f0e8;
    --ai-bg: #fdfaf3;
    --danger: #a05050;
    --shadow: 0 2px 12px rgba(44,36,23,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
  }
  #sidebar-header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h1 {
    font-family: 'Zen Antique', serif;
    font-size: 1.2rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  #sidebar-header p {
    font-size: 0.72rem;
    color: var(--text-sub);
    margin-top: 2px;
  }
  .sidebar-section {
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border-light);
  }
  .sidebar-label {
    font-size: 0.68rem;
    color: var(--text-sub);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  select, textarea, input {
    width: 100%;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, textarea:focus, input:focus {
    border-color: var(--accent-light);
  }
  #model-select { cursor: pointer; }
  #system-prompt {
    resize: vertical;
    min-height: 80px;
    max-height: 160px;
    line-height: 1.5;
    font-size: 0.78rem;
  }
  .preset-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
  }
  .preset-btn {
    font-size: 0.7rem;
    padding: 3px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    color: var(--text-sub);
    transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .preset-btn:hover {
    background: var(--accent-bg);
    border-color: var(--accent-light);
    color: var(--accent);
  }
  #history-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
  }
  .history-item {
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 0.75rem;
    color: var(--text-sub);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.15s;
    margin-bottom: 2px;
  }
  .history-item:hover { background: var(--bg); }
  .history-item.active { background: var(--accent-bg); color: var(--accent); }
  #sidebar-footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
  }
  .btn-ghost {
    width: 100%;
    padding: 7px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost:hover { background: var(--bg); color: var(--danger); border-color: var(--danger); }

  /* ── Main ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #top-bar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg2);
  }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s;
  }
  #status-dot.ok { background: var(--accent); }
  #status-dot.err { background: var(--danger); }
  #status-text { font-size: 0.78rem; color: var(--text-sub); flex: 1; }
  #ollama-url {
    width: 220px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    padding: 5px 8px;
  }

  /* ── Chat ── */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 30px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg-wrap {
    display: flex;
    flex-direction: column;
    max-width: 78%;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-wrap.user { align-self: flex-end; align-items: flex-end; }
  .msg-wrap.assistant { align-self: flex-start; align-items: flex-start; }
  .msg-label {
    font-size: 0.65rem;
    color: var(--text-sub);
    margin-bottom: 3px;
    letter-spacing: 0.05em;
  }
  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.7;
    font-size: 0.88rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-wrap.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid #c8dcc8;
    border-bottom-right-radius: 4px;
  }
  .msg-wrap.assistant .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border-light);
    border-bottom-left-radius: 4px;
  }
  .cursor-blink::after {
    content: '▋';
    animation: blink 0.8s step-end infinite;
    color: var(--accent);
    font-size: 0.85em;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-sub);
    gap: 8px;
  }
  #empty-state .em-icon { font-size: 2.5rem; opacity: 0.3; }
  #empty-state p { font-size: 0.82rem; }

  /* ── Input area ── */
  #input-area {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }
  .quick-btns {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .quick-btn {
    font-size: 0.72rem;
    padding: 4px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .quick-btn:hover {
    background: var(--accent-bg);
    border-color: var(--accent-light);
    color: var(--accent);
  }
  #input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    font-size: 0.9rem;
    border-radius: 10px;
    padding: 10px 14px;
  }
  #send-btn {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    color: white;
    font-size: 1.1rem;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #send-btn:hover { background: #4a6a4a; }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }
  #char-hint { font-size: 0.68rem; color: var(--text-sub); text-align: right; margin-top: 4px; }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>Ollama Chat</h1>
    <p>ローカルAIチャット</p>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">モデル</div>
    <select id="model-select">
      <option value="">読み込み中...</option>
    </select>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">システムプロンプト</div>
    <textarea id="system-prompt" placeholder="AIへの事前指示（例：日本語で答えてください）"></textarea>
    <div class="preset-buttons">
      <button class="preset-btn" data-prompt="必ず日本語で回答してください。">🇯🇵 日本語</button>
      <button class="preset-btn" data-prompt="Always respond in English.">🇬🇧 English</button>
      <button class="preset-btn" data-prompt="あなたは翻訳の専門家です。与えられたテキストを自然な表現で翻訳してください。日本語が入力されたら英語に、英語が入力されたら日本語に翻訳してください。翻訳文のみを出力し、説明は不要です。">🔤 翻訳専門</button>
      <button class="preset-btn" data-prompt="あなたは医学・医療分野の専門家です。正確な情報を提供しつつ、わかりやすい言葉で説明してください。">🏥 医学</button>
      <button class="preset-btn" data-prompt="">✕ クリア</button>
    </div>
  </div>

  <div class="sidebar-section" style="padding-bottom:6px;">
    <div class="sidebar-label">会話履歴</div>
  </div>
  <div id="history-list"></div>

  <div id="sidebar-footer">
    <button class="btn-ghost" id="new-chat-btn">＋ 新しい会話</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="top-bar">
    <div id="status-dot"></div>
    <span id="status-text">接続確認中...</span>
    <input type="text" id="ollama-url" value="http://localhost:11434" placeholder="Ollama URL">
    <button class="quick-btn" id="connect-btn">接続</button>
  </div>

  <div id="chat-area">
    <div id="empty-state">
      <div class="em-icon">💬</div>
      <p>メッセージを入力して会話を始めてください</p>
      <p style="font-size:0.72rem;">「翻訳して」などのクイックボタンも使えます</p>
    </div>
  </div>

  <div id="input-area">
    <div class="quick-btns">
      <button class="quick-btn" data-insert="以下を日本語に翻訳してください：\n\n">🔤 →日本語</button>
      <button class="quick-btn" data-insert="以下を英語に翻訳してください：\n\n">🔤 →English</button>
      <button class="quick-btn" data-insert="以下を要約してください：\n\n">📝 要約</button>
      <button class="quick-btn" data-insert="以下の文章を校正してください：\n\n">✏️ 校正</button>
      <button class="quick-btn" data-insert="以下を説明してください：\n\n">❓ 説明</button>
    </div>
    <div id="input-row">
      <textarea id="user-input" placeholder="メッセージを入力… (Ctrl+Enter で送信)"></textarea>
      <button id="send-btn" title="送信">➤</button>
    </div>
    <div id="char-hint">Ctrl+Enter で送信　／　Enter で改行</div>
  </div>
</div>

<script>
// ── State ──
let conversations = JSON.parse(localStorage.getItem('ollama_convs') || '[]');
let currentId = null;
let isStreaming = false;

function getCurrentConv() {
  return conversations.find(c => c.id === currentId);
}

// ── Ollama connection ──
async function checkConnection() {
  const url = document.getElementById('ollama-url').value.trim();
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  try {
    const res = await fetch(`${url}/api/tags`);
    const data = await res.json();
    dot.className = 'ok';
    const models = data.models || [];
    txt.textContent = `接続中 (${models.length} モデル)`;
    const sel = document.getElementById('model-select');
    sel.innerHTML = models.length
      ? models.map(m => `<option value="${m.name}">${m.name}</option>`).join('')
      : '<option value="">モデルなし</option>';
    // 前回選択を復元
    const saved = localStorage.getItem('ollama_model');
    if (saved) sel.value = saved;
  } catch {
    dot.className = 'err';
    txt.textContent = 'Ollama に接続できません';
    document.getElementById('model-select').innerHTML = '<option value="">接続エラー</option>';
  }
}

document.getElementById('connect-btn').onclick = checkConnection;
document.getElementById('ollama-url').addEventListener('change', checkConnection);
checkConnection();

// ── Model save ──
document.getElementById('model-select').addEventListener('change', e => {
  localStorage.setItem('ollama_model', e.target.value);
});

// ── System prompt presets ──
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.onclick = () => {
    document.getElementById('system-prompt').value = btn.dataset.prompt;
  };
});

// ── History UI ──
function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  [...conversations].reverse().forEach(conv => {
    const div = document.createElement('div');
    div.className = 'history-item' + (conv.id === currentId ? ' active' : '');
    div.textContent = conv.title || '新しい会話';
    div.onclick = () => loadConv(conv.id);
    list.appendChild(div);
  });
}

function loadConv(id) {
  currentId = id;
  renderHistory();
  const conv = getCurrentConv();
  document.getElementById('chat-area').innerHTML = '';
  document.getElementById('empty-state') && document.getElementById('chat-area').appendChild(makeEmptyState());
  if (!conv || conv.messages.length === 0) {
    showEmptyState();
    return;
  }
  hideEmptyState();
  conv.messages.forEach(m => appendBubble(m.role, m.content));
}

function makeEmptyState() {
  const d = document.createElement('div');
  d.id = 'empty-state';
  d.innerHTML = '<div class="em-icon">💬</div><p>メッセージを入力して会話を始めてください</p><p style="font-size:0.72rem;">「翻訳して」などのクイックボタンも使えます</p>';
  return d;
}
function showEmptyState() {
  let e = document.getElementById('empty-state');
  if (!e) { e = makeEmptyState(); document.getElementById('chat-area').appendChild(e); }
  e.style.display = 'flex';
}
function hideEmptyState() {
  const e = document.getElementById('empty-state');
  if (e) e.style.display = 'none';
}

function newChat() {
  const id = Date.now().toString();
  conversations.push({ id, title: '', messages: [] });
  saveConvs();
  currentId = id;
  document.getElementById('chat-area').innerHTML = '';
  showEmptyState();
  renderHistory();
}

function saveConvs() {
  // 最大20件
  if (conversations.length > 20) conversations = conversations.slice(-20);
  localStorage.setItem('ollama_convs', JSON.stringify(conversations));
}

document.getElementById('new-chat-btn').onclick = newChat;

// ── Chat bubbles ──
function appendBubble(role, text) {
  const chatArea = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'あなた' : 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chatArea.appendChild(wrap);
  chatArea.scrollTop = chatArea.scrollHeight;
  return bubble;
}

// ── Send ──
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  const model = document.getElementById('model-select').value;
  if (!model) { alert('モデルを選択してください'); return; }

  if (!currentId) newChat();
  hideEmptyState();

  const conv = getCurrentConv();
  conv.messages.push({ role: 'user', content: text });
  if (!conv.title) {
    conv.title = text.slice(0, 24) + (text.length > 24 ? '…' : '');
  }
  input.value = '';
  input.style.height = '44px';
  appendBubble('user', text);
  renderHistory();

  // 直近10ターン（20メッセージ）のみ送信
  const history = conv.messages.slice(-20);
  const systemPrompt = document.getElementById('system-prompt').value.trim();

  const ollamaUrl = document.getElementById('ollama-url').value.trim();
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  isStreaming = true;

  const aiBubble = appendBubble('assistant', '');
  aiBubble.classList.add('cursor-blink');

  let fullText = '';
  try {
    const body = {
      model,
      messages: history,
      stream: true,
      ...(systemPrompt ? { system: systemPrompt } : {})
    };
    const res = await fetch(`${ollamaUrl}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value).split('\n').filter(Boolean);
      for (const line of lines) {
        try {
          const json = JSON.parse(line);
          if (json.message?.content) {
            fullText += json.message.content;
            aiBubble.textContent = fullText;
            document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
          }
        } catch {}
      }
    }
  } catch (e) {
    fullText = `エラー: ${e.message}\n\nOllamaが起動しているか確認してください。`;
    aiBubble.textContent = fullText;
  }

  aiBubble.classList.remove('cursor-blink');
  conv.messages.push({ role: 'assistant', content: fullText });
  saveConvs();
  isStreaming = false;
  sendBtn.disabled = false;
}

// ── Input events ──
document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendMessage(); }
  // 自動リサイズ
  setTimeout(() => {
    e.target.style.height = '44px';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  }, 0);
});
document.getElementById('send-btn').onclick = sendMessage;

// クイックボタン
document.querySelectorAll('[data-insert]').forEach(btn => {
  btn.onclick = () => {
    const inp = document.getElementById('user-input');
    inp.value = btn.dataset.insert + inp.value;
    inp.focus();
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  };
});

// ── Init ──
if (conversations.length > 0) {
  loadConv(conversations[conversations.length - 1].id);
} else {
  newChat();
}
renderHistory();
</script>
</body>
</html>
