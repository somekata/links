<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一元配置ANOVA対話的学習ツール</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Zen+Antique:wght@400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f1e8;
            --paper: #fdfaf3;
            --ink: #1c1710;
            --accent: #2d5a4a;
            --accent-light: #5a9480;
            --border: #d4cfc5;
            --error: #d4634a;
            --success: #4a8d6a;
            --muted: #8b8680;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            display: grid;
            grid-template-columns: 240px 1fr 320px;
            min-height: 100vh;
            gap: 0;
        }

        /* ==================== SIDEBAR LEFT ==================== */
        .sidebar-left {
            background: var(--paper);
            border-right: 2px solid var(--border);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            position: sticky;
            top: 0;
            max-height: 100vh;
        }

        .logo {
            font-family: 'Zen Antique', serif;
            font-size: 1.6rem;
            color: var(--accent);
            margin-bottom: 2rem;
            text-align: center;
        }

        .nav-section {
            margin-bottom: 2rem;
        }

        .nav-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 0.75rem;
        }

        .nav-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(45, 90, 74, 0.1);
            border-left-color: var(--accent);
        }

        .nav-item.active {
            background: rgba(45, 90, 74, 0.15);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        /* ==================== BACK LINK ==================== */
        .back-link {
            display: inline-block;
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
            background: var(--border);
            color: var(--ink);
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .back-link:hover {
            background: var(--accent);
            color: white;
            border-left-color: white;
        }

        /* ==================== MAIN CONTENT ==================== */
        .main {
            padding: 3rem;
            overflow-y: auto;
            background: var(--bg);
        }

        .header {
            margin-bottom: 2.5rem;
        }

        .page-title {
            font-family: 'Zen Antique', serif;
            font-size: 2.2rem;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1rem;
            color: var(--muted);
        }

        /* ==================== CARD SYSTEM ==================== */
        .card {
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .card-title {
            font-family: 'Zen Antique', serif;
            font-size: 1.4rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 1.4rem;
            background: var(--accent);
            border-radius: 2px;
        }

        /* ==================== DATA INPUT ==================== */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .group-input {
            padding: 1.5rem;
            background: rgba(45, 90, 74, 0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .group-label {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .group-label::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }

        .textarea-input {
            width: 100%;
            min-height: 120px;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            resize: vertical;
            background: var(--paper);
            color: var(--ink);
        }

        .hint {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 0.5rem;
        }

        /* ==================== BUTTONS ==================== */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(45, 90, 74, 0.3);
        }

        .btn-secondary {
            background: var(--border);
            color: var(--ink);
        }

        .btn-secondary:hover {
            background: var(--muted);
        }

        /* ==================== CALCULATION STEPS ==================== */
        .calc-steps {
            background: rgba(45, 90, 74, 0.05);
            padding: 1.5rem;
            border-radius: 6px;
            margin-bottom: 2rem;
            border-left: 4px solid var(--accent);
        }

        .calc-step {
            margin-bottom: 1.5rem;
        }

        .calc-step:last-child {
            margin-bottom: 0;
        }

        .step-title {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .step-formula {
            background: var(--paper);
            padding: 1rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            margin-bottom: 0.5rem;
            color: var(--ink);
        }

        .step-result {
            background: rgba(74, 141, 106, 0.1);
            padding: 0.75rem;
            border-radius: 4px;
            border-left: 3px solid var(--success);
            font-weight: 600;
            color: var(--ink);
        }

        /* ==================== RESULTS ==================== */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .results-table th {
            background: var(--accent);
            color: white;
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
        }

        .results-table td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .results-table tr:hover {
            background: rgba(45, 90, 74, 0.05);
        }

        .stat-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .stat {
            padding: 1rem;
            background: rgba(45, 90, 74, 0.05);
            border-radius: 6px;
            border-left: 4px solid var(--accent);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--ink);
            font-family: 'JetBrains Mono', monospace;
        }

        .p-value {
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: 600;
            display: inline-block;
            margin-top: 0.5rem;
        }

        .p-value.significant {
            background: rgba(74, 141, 106, 0.2);
            color: var(--success);
        }

        .p-value.not-significant {
            background: rgba(212, 99, 74, 0.2);
            color: var(--error);
        }

        /* ==================== SIDEBAR RIGHT ==================== */
        .sidebar-right {
            background: var(--paper);
            border-left: 2px solid var(--border);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            position: sticky;
            top: 0;
            max-height: 100vh;
        }

        .viz-title {
            font-family: 'Zen Antique', serif;
            font-size: 1.1rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        /* Canvas styling */
        canvas {
            width: 100%;
            height: auto;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
        }

        /* ==================== DEMO DATA ==================== */
        .demo-preset {
            padding: 0.75rem 1rem;
            background: var(--border);
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .demo-preset:hover {
            background: var(--accent);
            color: white;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 1400px) {
            body {
                grid-template-columns: 200px 1fr;
            }
            .sidebar-right {
                display: none;
            }
        }

        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
            }
            .sidebar-left {
                display: none;
            }
            .input-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ==================== SCROLLBAR ==================== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ==================== UTILITIES ==================== */
        .hidden {
            display: none;
        }

        .error-message {
            color: var(--error);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>

    <script>
        // ==================== STATE MANAGEMENT ====================
        const state = {
            groupA: [],
            groupB: [],
            groupC: [],
            calculated: false,
            results: null
        };

        // ==================== UTILITY FUNCTIONS ====================
        function parseInput(text) {
            return text
                .split('\n')
                .map(v => parseFloat(v.trim()))
                .filter(v => !isNaN(v));
        }

        function mean(arr) {
            return arr.reduce((a, b) => a + b, 0) / arr.length;
        }

        function variance(arr) {
            const m = mean(arr);
            return arr.reduce((sum, v) => sum + Math.pow(v - m, 2), 0) / (arr.length - 1);
        }

        function stddev(arr) {
            return Math.sqrt(variance(arr));
        }

        function round(value, decimals = 4) {
            return Math.round(value * Math.pow(10, decimals)) / Math.pow(10, decimals);
        }

        // ==================== F-DISTRIBUTION CDF (Welford approximation for p-value) ====================
        function fDistributionCDF(f, df1, df2) {
            // Approximation using incomplete beta function
            // For simplicity, using a lookup table approach or numerical integration
            // For educational purposes, we'll use an approximation
            if (f < 0) return 0;
            
            // Using a simple numerical approximation
            const x = (df1 * f) / (df1 * f + df2);
            
            // Incomplete beta function approximation (simplified)
            let betaApprox;
            if (x < 0.5) {
                betaApprox = x / (1 - x + df1 / df2);
            } else {
                betaApprox = 1 - (1 - x) / (x + df2 / (df1 * (1 - x)));
            }
            
            // Regularized incomplete beta function (simplified approximation)
            const result = Math.min(1, Math.max(0, betaApprox));
            return result;
        }

        function pValue(f, df1, df2) {
            return 1 - fDistributionCDF(f, df1, df2);
        }

        // ==================== ANOVA CALCULATION ====================
        function calculateANOVA(groupA, groupB, groupC) {
            const groups = [groupA, groupB, groupC];
            const k = groups.length; // number of groups
            const n_total = groupA.length + groupB.length + groupC.length;
            const df_between = k - 1;
            const df_within = n_total - k;
            const df_total = n_total - 1;

            // Overall mean
            const allData = [...groupA, ...groupB, ...groupC];
            const grandMean = mean(allData);

            // Between-group sum of squares
            let ss_between = 0;
            groups.forEach(group => {
                const groupMean = mean(group);
                ss_between += group.length * Math.pow(groupMean - grandMean, 2);
            });

            // Within-group sum of squares
            let ss_within = 0;
            groups.forEach(group => {
                const groupMean = mean(group);
                group.forEach(value => {
                    ss_within += Math.pow(value - groupMean, 2);
                });
            });

            const ss_total = ss_between + ss_within;

            // Mean squares
            const ms_between = ss_between / df_between;
            const ms_within = ss_within / df_within;

            // F-statistic
            const f_value = ms_between / ms_within;

            // p-value
            const p = pValue(f_value, df_between, df_within);

            return {
                groups: { A: groupA, B: groupB, C: groupC },
                means: { A: mean(groupA), B: mean(groupB), C: mean(groupC) },
                stddevs: { A: stddev(groupA), B: stddev(groupB), C: stddev(groupC) },
                grandMean,
                ss_between: round(ss_between),
                ss_within: round(ss_within),
                ss_total: round(ss_total),
                df_between,
                df_within,
                df_total,
                ms_between: round(ms_between),
                ms_within: round(ms_within),
                f_value: round(f_value),
                p_value: round(p, 6),
                significant: p < 0.05
            };
        }

        // ==================== RENDER CALCULATION STEPS ====================
        function renderCalculationSteps(results) {
            const container = document.getElementById('calc-container');
            container.innerHTML = '';

            const steps = [
                {
                    title: 'ステップ1: 各群の基本統計量',
                    content: `
                        <div class="step-formula">肥料A: n=${results.groups.A.length}, 平均=${round(results.means.A, 2)}, SD=${round(results.stddevs.A, 2)}</div>
                        <div class="step-formula">肥料B: n=${results.groups.B.length}, 平均=${round(results.means.B, 2)}, SD=${round(results.stddevs.B, 2)}</div>
                        <div class="step-formula">肥料C: n=${results.groups.C.length}, 平均=${round(results.means.C, 2)}, SD=${round(results.stddevs.C, 2)}</div>
                        <div class="step-result">全体平均（大平均）= ${round(results.grandMean, 2)}</div>
                    `
                },
                {
                    title: 'ステップ2: 平方和（Sum of Squares）の計算',
                    content: `
                        <div class="step-formula">SS<sub>between</sub> = Σn<sub>i</sub>(x̄<sub>i</sub> - x̄)<sup>2</sup></div>
                        <div class="step-formula">肥料A: 5×(${round(results.means.A, 2)}-${round(results.grandMean, 2)})<sup>2</sup> = ${5 * Math.pow(round(results.means.A, 2) - round(results.grandMean, 2), 2).toFixed(2)}</div>
                        <div class="step-formula">肥料B: 5×(${round(results.means.B, 2)}-${round(results.grandMean, 2)})<sup>2</sup> = ${5 * Math.pow(round(results.means.B, 2) - round(results.grandMean, 2), 2).toFixed(2)}</div>
                        <div class="step-formula">肥料C: 5×(${round(results.means.C, 2)}-${round(results.grandMean, 2)})<sup>2</sup> = ${5 * Math.pow(round(results.means.C, 2) - round(results.grandMean, 2), 2).toFixed(2)}</div>
                        <div class="step-result">SS<sub>between</sub> = ${results.ss_between}</div>
                        <div class="step-formula" style="margin-top: 1rem;">SS<sub>within</sub> = ΣΣ(x<sub>ij</sub> - x̄<sub>i</sub>)<sup>2</sup></div>
                        <div class="step-result" style="margin-top: 0.5rem;">SS<sub>within</sub> = ${results.ss_within}</div>
                        <div class="step-formula" style="margin-top: 1rem;">SS<sub>total</sub> = SS<sub>between</sub> + SS<sub>within</sub> = ${results.ss_between} + ${results.ss_within}</div>
                        <div class="step-result" style="margin-top: 0.5rem;">SS<sub>total</sub> = ${results.ss_total}</div>
                    `
                },
                {
                    title: 'ステップ3: 平均平方（Mean Squares）と自由度',
                    content: `
                        <div class="step-formula">df<sub>between</sub> = k - 1 = 3 - 1 = ${results.df_between}</div>
                        <div class="step-formula">df<sub>within</sub> = N - k = ${results.groups.A.length + results.groups.B.length + results.groups.C.length} - 3 = ${results.df_within}</div>
                        <div class="step-formula">df<sub>total</sub> = N - 1 = ${results.groups.A.length + results.groups.B.length + results.groups.C.length} - 1 = ${results.df_total}</div>
                        <div class="step-formula" style="margin-top: 1rem;">MS<sub>between</sub> = SS<sub>between</sub> / df<sub>between</sub> = ${results.ss_between} / ${results.df_between}</div>
                        <div class="step-result" style="margin-top: 0.5rem;">MS<sub>between</sub> = ${results.ms_between}</div>
                        <div class="step-formula" style="margin-top: 1rem;">MS<sub>within</sub> = SS<sub>within</sub> / df<sub>within</sub> = ${results.ss_within} / ${results.df_within}</div>
                        <div class="step-result" style="margin-top: 0.5rem;">MS<sub>within</sub> = ${results.ms_within}</div>
                    `
                },
                {
                    title: 'ステップ4: F値の計算',
                    content: `
                        <div class="step-formula">F = MS<sub>between</sub> / MS<sub>within</sub> = ${results.ms_between} / ${results.ms_within}</div>
                        <div class="step-result">F = ${results.f_value}</div>
                    `
                },
                {
                    title: 'ステップ5: p値と有意性判定',
                    content: `
                        <div class="step-formula">自由度: df<sub>between</sub>=${results.df_between}, df<sub>within</sub>=${results.df_within}</div>
                        <div class="step-formula">F分布表またはR/Pythonを参照: F(${results.df_between},${results.df_within}) = ${results.f_value}</div>
                        <div class="step-result">p値 = ${results.p_value}</div>
                        <div class="step-formula" style="margin-top: 1rem;">有意水準: α = 0.05</div>
                        <div class="step-result" style="margin-top: 0.5rem;">判定: p${results.p_value < 0.05 ? '<' : '≥'} 0.05 → ${results.significant ? '有意差あり' : '有意差なし'}</div>
                    `
                }
            ];

            steps.forEach(step => {
                const stepEl = document.createElement('div');
                stepEl.className = 'calc-step';
                stepEl.innerHTML = `
                    <div class="step-title">${step.title}</div>
                    ${step.content}
                `;
                container.appendChild(stepEl);
            });
        }

        // ==================== RENDER ANOVA TABLE ====================
        function renderANOVATable(results) {
            const table = document.getElementById('anova-table');
            table.innerHTML = `
                <tr>
                    <th>要因</th>
                    <th>SS</th>
                    <th>df</th>
                    <th>MS</th>
                    <th>F値</th>
                    <th>p値</th>
                </tr>
                <tr>
                    <td><strong>群間</strong></td>
                    <td>${results.ss_between}</td>
                    <td>${results.df_between}</td>
                    <td>${results.ms_between}</td>
                    <td>${results.f_value}</td>
                    <td>${results.p_value}</td>
                </tr>
                <tr>
                    <td><strong>群内</strong></td>
                    <td>${results.ss_within}</td>
                    <td>${results.df_within}</td>
                    <td>${results.ms_within}</td>
                    <td>-</td>
                    <td>-</td>
                </tr>
                <tr style="font-weight: 600; background: rgba(45, 90, 74, 0.1);">
                    <td><strong>合計</strong></td>
                    <td>${results.ss_total}</td>
                    <td>${results.df_total}</td>
                    <td>-</td>
                    <td>-</td>
                    <td>-</td>
                </tr>
            `;

            document.getElementById('result-f-value').textContent = results.f_value;
            document.getElementById('result-p-value').textContent = results.p_value;

            const interpretation = document.getElementById('p-interpretation');
            if (results.p_value < 0.05) {
                interpretation.innerHTML = '<span class="p-value significant">有意差あり（p < 0.05）</span>';
            } else {
                interpretation.innerHTML = '<span class="p-value not-significant">有意差なし（p ≥ 0.05）</span>';
            }

            const conclusion = document.getElementById('conclusion');
            if (results.significant) {
                conclusion.innerHTML = `
                    <strong>📌 結論</strong><br>
                    肥料の種類によって、植物の成長高さに統計的に有意な差がある（F=${results.f_value}, p=${results.p_value}）。
                    3つの肥料の効果は異なると言えます。
                `;
            } else {
                conclusion.innerHTML = `
                    <strong>📌 結論</strong><br>
                    肥料の種類による植物成長高さの差は、統計的には有意ではない（F=${results.f_value}, p=${results.p_value}）。
                    現在のデータでは、肥料の効果差を確認できません。
                `;
            }
        }

        // ==================== DRAW BOX PLOT ====================
        function drawBoxPlot(results) {
            const canvas = document.getElementById('canvas-boxplot');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const padding = 30;
            const boxWidth = 60;
            const spacing = (width - 2 * padding - 3 * boxWidth) / 4;

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);

            ctx.strokeStyle = '#d4cfc5';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();

            const groups = [
                { name: '肥料A', data: results.groups.A, x: padding + spacing },
                { name: '肥料B', data: results.groups.B, x: padding + spacing + boxWidth + spacing },
                { name: '肥料C', data: results.groups.C, x: padding + spacing + 2 * (boxWidth + spacing) }
            ];

            groups.forEach(group => {
                const sorted = group.data.slice().sort((a, b) => a - b);
                const min = sorted[0];
                const max = sorted[sorted.length - 1];
                const q1 = sorted[Math.floor(sorted.length * 0.25)];
                const median = sorted[Math.floor(sorted.length * 0.5)];
                const q3 = sorted[Math.floor(sorted.length * 0.75)];

                const yScale = (height - 2 * padding) / (Math.max(...results.groups.A, ...results.groups.B, ...results.groups.C) - Math.min(...results.groups.A, ...results.groups.B, ...results.groups.C) + 5);
                const yOffset = (value) => height - padding - (value - Math.min(...results.groups.A, ...results.groups.B, ...results.groups.C) + 2.5) * yScale;

                // Whiskers
                ctx.strokeStyle = '#2d5a4a';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(group.x + boxWidth / 2, yOffset(min));
                ctx.lineTo(group.x + boxWidth / 2, yOffset(q1));
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(group.x + boxWidth / 2, yOffset(q3));
                ctx.lineTo(group.x + boxWidth / 2, yOffset(max));
                ctx.stroke();

                // Box
                ctx.fillStyle = 'rgba(45, 90, 74, 0.3)';
                ctx.strokeStyle = '#2d5a4a';
                ctx.lineWidth = 2;
                ctx.fillRect(group.x, yOffset(q3), boxWidth, yOffset(q1) - yOffset(q3));
                ctx.strokeRect(group.x, yOffset(q3), boxWidth, yOffset(q1) - yOffset(q3));

                // Median line
                ctx.strokeStyle = '#2d5a4a';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(group.x, yOffset(median));
                ctx.lineTo(group.x + boxWidth, yOffset(median));
                ctx.stroke();

                // Label
                ctx.fillStyle = '#1c1710';
                ctx.font = 'bold 12px Noto Sans JP';
                ctx.textAlign = 'center';
                ctx.fillText(group.name, group.x + boxWidth / 2, height - 10);
            });
        }

        // ==================== DRAW SCATTER PLOT ====================
        function drawScatterPlot(results) {
            const canvas = document.getElementById('canvas-scatter');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const padding = 30;

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);

            // Axes
            ctx.strokeStyle = '#d4cfc5';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.stroke();

            const allData = [...results.groups.A, ...results.groups.B, ...results.groups.C];
            const minVal = Math.min(...allData);
            const maxVal = Math.max(...allData);
            const yScale = (height - 2 * padding) / (maxVal - minVal + 2);

            const colors = ['#5a9480', '#4a7a6a', '#3a5a4a'];
            const xPositions = [padding + 40, padding + 120, padding + 200];

            const groups = [results.groups.A, results.groups.B, results.groups.C];
            groups.forEach((group, idx) => {
                ctx.fillStyle = colors[idx];
                group.forEach((value, i) => {
                    const y = height - padding - (value - minVal + 1) * yScale;
                    const x = xPositions[idx] + (Math.random() - 0.5) * 30;
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, 2 * Math.PI);
                    ctx.fill();
                });

                // Mean line
                ctx.strokeStyle = colors[idx];
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                const meanY = height - padding - (results.means[String.fromCharCode(65 + idx)] - minVal + 1) * yScale;
                ctx.beginPath();
                ctx.moveTo(xPositions[idx] - 20, meanY);
                ctx.lineTo(xPositions[idx] + 20, meanY);
                ctx.stroke();
                ctx.setLineDash([]);
            });

            // Labels
            ctx.fillStyle = '#1c1710';
            ctx.font = 'bold 11px Noto Sans JP';
            ctx.textAlign = 'center';
            ['A', 'B', 'C'].forEach((label, idx) => {
                ctx.fillText(`肥料${label}`, xPositions[idx], height - 10);
            });
        }

        // ==================== UPDATE STATS SUMMARY ====================
        function updateStatsSummary(results) {
            const container = document.getElementById('stats-summary');
            container.innerHTML = `
                <div style="font-size: 0.85rem; color: #8b8680;">
                    <div style="padding: 0.75rem 0; border-bottom: 1px solid #d4cfc5;">
                        <strong>肥料A</strong><br>
                        平均: ${round(results.means.A, 2)} (SD: ${round(results.stddevs.A, 2)})
                    </div>
                    <div style="padding: 0.75rem 0; border-bottom: 1px solid #d4cfc5;">
                        <strong>肥料B</strong><br>
                        平均: ${round(results.means.B, 2)} (SD: ${round(results.stddevs.B, 2)})
                    </div>
                    <div style="padding: 0.75rem 0;">
                        <strong>肥料C</strong><br>
                        平均: ${round(results.means.C, 2)} (SD: ${round(results.stddevs.C, 2)})
                    </div>
                </div>
            `;
        }

        // ==================== SECTION NAVIGATION ====================
        function showSection(sectionName) {
            document.querySelectorAll('[id^="section-"]').forEach(el => {
                el.classList.add('section-hidden');
                el.classList.remove('section-visible');
            });
            const targetSection = document.getElementById(`section-${sectionName}`);
            if (targetSection) {
                targetSection.classList.remove('section-hidden');
                targetSection.classList.add('section-visible');
            }
            document.querySelectorAll('.nav-item[data-section]').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelector(`[data-section="${sectionName}"]`).classList.add('active');
        }

        // ==================== MAIN CALCULATION HANDLER ====================
        function executeCalculation() {
            const errorEl = document.getElementById('input-error');
            errorEl.classList.add('hidden');

            const groupA = parseInput(document.getElementById('groupA').value);
            const groupB = parseInput(document.getElementById('groupB').value);
            const groupC = parseInput(document.getElementById('groupC').value);

            if (groupA.length < 2 || groupB.length < 2 || groupC.length < 2) {
                errorEl.textContent = '各グループに最低2つ以上のデータが必要です。';
                errorEl.classList.remove('hidden');
                return;
            }

            if (groupA.length !== groupB.length || groupB.length !== groupC.length) {
                errorEl.textContent = '各グループのサンプルサイズは同じである必要があります。';
                errorEl.classList.remove('hidden');
                return;
            }

            state.groupA = groupA;
            state.groupB = groupB;
            state.groupC = groupC;

            const results = calculateANOVA(groupA, groupB, groupC);
            state.results = results;
            state.calculated = true;

            renderCalculationSteps(results);
            renderANOVATable(results);
            drawBoxPlot(results);
            drawScatterPlot(results);
            updateStatsSummary(results);

            showSection('calculation');
        }

        // ==================== DEMO PRESETS ====================
        const demoData = {
            example1: {
                A: [24, 25, 23, 26, 22],
                B: [28, 30, 29, 31, 27],
                C: [20, 21, 19, 22, 20]
            },
            example2: {
                A: [22, 23, 21, 24, 20],
                B: [23, 22, 24, 21, 25],
                C: [21, 23, 22, 20, 24]
            }
        };

        function loadDemo(key) {
            const demo = demoData[key];
            document.getElementById('groupA').value = demo.A.join('\n');
            document.getElementById('groupB').value = demo.B.join('\n');
            document.getElementById('groupC').value = demo.C.join('\n');
            executeCalculation();
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('btn-calculate').addEventListener('click', executeCalculation);
        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('groupA').value = '';
            document.getElementById('groupB').value = '';
            document.getElementById('groupC').value = '';
            document.getElementById('input-error').classList.add('hidden');
            showSection('input');
            state.calculated = false;
        });

        document.querySelectorAll('[data-section]').forEach(el => {
            el.addEventListener('click', () => {
                if (el.dataset.section !== 'input' && !state.calculated) {
                    document.getElementById('input-error').textContent = 'まずデータを入力して計算を実行してください。';
                    document.getElementById('input-error').classList.remove('hidden');
                } else {
                    showSection(el.dataset.section);
                }
            });
        });

        document.querySelectorAll('.demo-preset').forEach(el => {
            el.addEventListener('click', () => {
                loadDemo(el.dataset.preset);
            });
        });

        // ==================== CSS ADDITIONS ====================
        const style = document.createElement('style');
        style.textContent = `
            .section-hidden { display: none; }
            .section-visible { display: block; animation: fadeIn 0.3s; }
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
        `;
        document.head.appendChild(style);

        // Initial demo load
        loadDemo('example1');
    </script>
</body>
</html>
